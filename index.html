<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Command Launcher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Mini Command Launcher</h1>

    <div class="row">
      <input id="commandInput" type="text" placeholder="Type a command like hello, clear, or help" />
      <button id="runBtn">Run</button>
    </div>

    <div class="chips">
      <button class="chip" data-command="hello">hello</button>
      <button class="chip" data-command="help">help</button>
      <button class="chip" data-command="clear">clear</button>
      <button class="chip" data-command="status">status</button>
    </div>

    <div id="result" class="result">Ready.</div>
    <div class="hint">This starts as separate files from the beginning.</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
